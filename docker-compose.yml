version: '3.9'
#VERY LIKELY NEEDS TO BE REVISED FOR OUR ENV AND IF ANY PACKAGE CHANGES OCCUR, SAME IS TRUE FOR BOTH FRONTEND AND BACKEND FILES.
services:
    #frontend
    frontend:
        build:
            context: ./Frontend
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        environment:
            - NEXT_PUBLIC_API_URL=http://localhost:8000
        depends_on:
            - backend
        networks:
            - app-network

    #Backend api
    backend:
        build:
            context: ./Backend
            dockerfile: Dockerfile
        ports:
            - "8000:8000"
        environment:
            - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/veridian
            - REDIS_URL=redis://redis:6379/0
            - OPENSEARCH_URL=http://opensearch:9200
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=${AWS_REGION}
            - S3_BUCKET_NAME=${S3_BUCKET_NAME}
            - JWT_SECRET=${JWT_SECRET}
        depends_on:
            - postgres
            - redis
            - opensearch
        networks:
            - app-network

    #Celery Worker
    #same image as backend
    celery-worker:
        build:
            context: ./Backend
            dockerfile: Dockerfile
        command: celery -A app.tasks.celery_app worker --loglevel=info
        environment:
            - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/veridian
            - REDIS_URL=redis://redis:6379/0
            - OPENSEARCH_URL=http://opensearch:9200
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_REGION=${AWS_REGION}
            - S3_BUCKET_NAME=${S3_BUCKET_NAME}
            - JWT_SECRET=${JWT_SECRET}
        depends_on:
            - backend
            - redis
            - postgres
        networks:
            - app-network

    postgres:
        image: postgres:16-alpine
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=veridian
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - app-network

    opensearch:
        image: opensearchproject/opensearch:2.11.0
        environment:
            - discovery.type=single-node
            - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
            - DISABLE_SECURITY_PLUGIN=true
        ports:
            - "9200:9200"
        volumes:
            - opensearch_data:/usr/share/opensearch/data
        networks:
            - app-network

volumes:
    postgres_data:
    redis_data:
    opensearch_data:

networks:
    app-network:
        driver: bridge